<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="網門電通工具出借即時同步系統 — 多人即時追蹤工具借出、歸還與現場狀態">
  <title>網門電通 — 工具出借即時同步</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Connection Status -->
  <div id="connection-status" class="connection-status disconnected">
    <span class="status-dot"></span>
    <span class="status-text">連線中...</span>
  </div>

  <!-- Header -->
  <header class="header" id="app-header">
    <div class="header-left">
      <div class="logo">
        <div class="logo-icon">🔧</div>
        <div class="logo-text">
          <h1>網門電通工具出借表</h1>
          <span class="logo-subtitle">即時同步 · 多人協作</span>
        </div>
      </div>
    </div>
    <div class="header-right">
      <div class="online-badge" title="在線人數">
        <span class="online-dot"></span>
        <span id="online-count">0</span> 人在線
      </div>
    </div>
  </header>

  <!-- Tab Navigation -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="form-tab">
      <span class="tab-icon">📋</span>
      <span class="tab-label">出借登記</span>
    </button>
    <button class="tab-btn" data-tab="history-tab">
      <span class="tab-icon">📅</span>
      <span class="tab-label">歷史紀錄</span>
    </button>
    <button class="tab-btn" data-tab="active-tab">
      <span class="tab-icon">📦</span>
      <span class="tab-label">外借中</span>
      <span class="tab-badge" id="active-badge" style="display:none;">0</span>
    </button>
    <button class="tab-btn" data-tab="admin-tab">
      <span class="tab-icon">⚙️</span>
      <span class="tab-label">管理</span>
    </button>
  </nav>

  <!-- ============= TAB 1: Borrow Form ============= -->
  <section id="form-tab" class="tab-content active">
    <div class="card info-card">
      <div class="info-grid">
        <div class="form-group">
          <label>📅 登記日期</label>
          <input type="date" id="borrow-date" required>
        </div>
        <div class="form-group">
          <label>🚗 車號</label>
          <input type="text" id="vehicle-num" placeholder="例如: AYK-3162" autocomplete="off">
          <div class="quick-tags" id="vehicle-tags"></div>
        </div>
        <div class="form-group">
          <label>📍 施工地點</label>
          <input type="text" id="location" placeholder="例如: 群聯、竹科" autocomplete="off">
          <div class="quick-tags" id="location-tags"></div>
        </div>
      </div>
    </div>

    <div class="card tool-section">
      <div class="section-header">
        <h2>🛠️ 工具設備狀態登記</h2>
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="tool-search" placeholder="搜尋工具名稱...">
        </div>
      </div>
      <div id="tools-container" class="tools-container"></div>
    </div>

    <div class="card staff-section">
      <h2>👥 人員確認</h2>
      <div class="staff-grid">
        <div class="staff-group">
          <label>借出人員 <span class="hint">(可複選)</span></label>
          <div class="staff-selector" id="checkout-staff"></div>
        </div>
        <div class="staff-group">
          <label>歸還人員 <span class="hint">(未歸還可留空)</span></label>
          <div class="staff-selector" id="return-staff"></div>
        </div>
      </div>
    </div>

    <div class="card form-actions">
      <button type="button" class="btn btn-secondary btn-lg" id="reset-form-btn">🗑️ 重設表單</button>
      <button type="button" class="btn btn-primary btn-lg" id="save-record-btn">💾 儲存出借登記</button>
    </div>
  </section>

  <!-- ============= TAB 2: History ============= -->
  <section id="history-tab" class="tab-content">
    <div class="card">
      <div class="section-header">
        <h2>📅 歷史出借紀錄</h2>
      </div>
      <div class="history-filters">
        <div class="search-box search-wide">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="history-search" placeholder="搜尋車號、地點、人員...">
        </div>
        <input type="date" id="history-date-filter" class="date-filter">
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">全部</button>
          <button class="filter-tab" data-filter="active">未歸還</button>
          <button class="filter-tab" data-filter="returned">已歸還</button>
        </div>
      </div>
    </div>
    <div id="history-list" class="history-list"></div>
  </section>

  <!-- ============= TAB 3: Active Loans ============= -->
  <section id="active-tab" class="tab-content">
    <div class="card">
      <div class="section-header">
        <h2>📦 目前外借中工具</h2>
        <span class="active-count" id="active-count-label">0 項工具未歸還</span>
      </div>
    </div>
    <div id="active-tools-list" class="active-tools-list"></div>
  </section>

  <!-- ============= TAB 4: Admin ============= -->
  <section id="admin-tab" class="tab-content">
    <!-- Admin Header -->
    <div class="card admin-header-card">
      <div class="section-header">
        <h2>⚙️ 管理員面板</h2>
        <span class="admin-badge">🔓 管理模式</span>
      </div>
      <p class="admin-desc">在此管理人員名單、工具清單、車號、施工地點，以及清除紀錄。所有更改即時同步至所有使用者。</p>
    </div>

    <!-- Staff Management -->
    <div class="card">
      <div class="section-header">
        <h2>👥 人員名單管理</h2>
      </div>
      <div class="admin-add-row">
        <input type="text" id="admin-new-staff" placeholder="新增人員名稱..." class="admin-input">
        <button class="btn btn-primary btn-sm" id="admin-add-staff-btn">➕ 新增</button>
      </div>
      <div class="admin-items-list" id="admin-staff-list"></div>
    </div>

    <!-- Tool Management -->
    <div class="card">
      <div class="section-header">
        <h2>🛠️ 工具清單管理</h2>
        <span class="admin-count" id="admin-tool-count">0 項</span>
      </div>
      <div class="admin-add-row">
        <input type="text" id="admin-new-tool-name" placeholder="工具名稱..." class="admin-input" style="flex:2;">
        <select id="admin-new-tool-category" class="admin-select">
          <option value="電鑽">電鑽</option>
          <option value="網路設備">網路設備</option>
          <option value="設備">設備</option>
          <option value="梯子">梯子</option>
          <option value="其他">其他</option>
        </select>
        <button class="btn btn-primary btn-sm" id="admin-add-tool-btn">➕ 新增</button>
      </div>
      <div class="admin-add-row" style="margin-top:4px;">
        <input type="text" id="admin-new-category" placeholder="新增自定分類..." class="admin-input">
        <button class="btn btn-secondary btn-sm" id="admin-add-category-btn">➕ 新增分類</button>
      </div>
      <div id="admin-tools-list" class="admin-tools-container"></div>
    </div>

    <!-- Vehicle Tags -->
    <div class="card">
      <div class="section-header">
        <h2>🚗 車號快速標籤</h2>
      </div>
      <div class="admin-add-row">
        <input type="text" id="admin-new-vehicle" placeholder="新增車號..." class="admin-input">
        <button class="btn btn-primary btn-sm" id="admin-add-vehicle-btn">➕ 新增</button>
      </div>
      <div class="admin-items-list" id="admin-vehicle-list"></div>
    </div>

    <!-- Location Tags -->
    <div class="card">
      <div class="section-header">
        <h2>📍 施工地點快速標籤</h2>
      </div>
      <div class="admin-add-row">
        <input type="text" id="admin-new-location" placeholder="新增地點..." class="admin-input">
        <button class="btn btn-primary btn-sm" id="admin-add-location-btn">➕ 新增</button>
      </div>
      <div class="admin-items-list" id="admin-location-list"></div>
    </div>

    <!-- Danger Zone -->
    <div class="card danger-zone">
      <div class="section-header">
        <h2>⚠️ 危險操作</h2>
      </div>
      <p class="admin-desc" style="color: var(--accent-red); margin-bottom: 12px;">以下操作無法復原，請謹慎使用。</p>
      <div class="danger-actions">
        <button class="btn btn-danger" id="admin-clear-records-btn">🗑️ 清除所有出借紀錄</button>
      </div>
    </div>
  </section>

  <!-- Record Detail Modal -->
  <div class="modal-overlay" id="record-modal">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modal-title">紀錄明細</h3>
        <button class="close-btn" id="close-modal-btn">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-danger btn-sm" id="modal-delete-btn">🗑️ 刪除紀錄</button>
        <button class="btn btn-primary" id="modal-close-foot-btn">關閉</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Sync Pulse -->
  <div class="sync-pulse" id="sync-pulse">
    <span class="pulse-dot"></span>
    即時同步中
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
